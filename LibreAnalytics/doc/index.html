<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation LibreAnalytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <script data-sp-id="SP_79747769" src="https://gael-berru.com/LibreAnalytics/smart_pixel_v2/public/tracker.js" async></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>LibreAnalytics</h1>
            <p>Documentation officielle – <a href="../smart_pixel_v2/public/">Dashboard</a> - <a href="../smart_pixel_v2/public/account.php">Api</a></p>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search" placeholder="Rechercher (ex: API, installation, UTM)..." autocomplete="off">
        <div id="autocomplete" class="autocomplete-items"></div>
    </div>

    <div class="container">
        <div class="main-layout">
            <div id="toc">
                <h2>Sommaire</h2>
                <ul id="toc-list">
                    <li><a href="#loading">Chargement...</a></li>
              </ul>
            </div>

            <div class="content" id="doc-content">
                <div class="loading">
                    <p>Chargement de la documentation...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Converter Markdown → HTML
        const converter = new showdown.Converter({
            tables: true,
            ghCompatibleHeaderId: true,
            simplifiedAutoLink: true,
            parseImgDimensions: true,
        });

        // Récupère le README.md
        fetch('https://raw.githubusercontent.com/berru-g/LibreAnalytics/main/readme.md')
            .then(response => {
                if (!response.ok) throw new Error("Fichier introuvable");
                return response.text();
            })
            .then(markdown => {
                const html = converter.makeHtml(markdown);
                document.getElementById('doc-content').innerHTML = html;
                generateTOC();
                setupSearch();
            })
            .catch(error => {
                console.error("Erreur:", error);
                document.getElementById('doc-content').innerHTML = `
                    <div class="alert" style="color: red; padding: 1rem; background: #ffebee; border-radius: 8px;">
                        <p>⚠️ Erreur de chargement : ${error.message}</p>
                        <p>Vérifiez l'URL du fichier : <a href="https://raw.githubusercontent.com/berru-g/LibreAnalytics/main/readme.md" target="_blank">Lien direct</a>.</p>
                    </div>
                `;
            });

        // Génère le sommaire
        function generateTOC() {
            const headers = document.querySelectorAll('.content h1, .content h2, .content h3');
            const tocList = document.getElementById('toc-list');
            tocList.innerHTML = '';

            if (headers.length === 0) {
                tocList.innerHTML = '<li>Aucun titre trouvé.</li>';
                return;
            }

            headers.forEach((header, index) => {
                const id = header.id || `section-${index}`;
                header.id = id;

                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = `#${id}`;
                a.textContent = header.textContent;
                a.style.paddingLeft = `${(parseInt(header.tagName.substring(1)) - 1) * 15}px`;

                // Smooth scroll sans décalage
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    const target = document.querySelector(a.getAttribute('href'));
                    if (target) {
                        // Compense la hauteur de la barre de recherche fixe
                        const offset = 80; // Hauteur du header + search bar
                        const targetPosition = target.getBoundingClientRect().top + window.pageYOffset - offset;
                        window.scrollTo({ top: targetPosition, behavior: 'smooth' });
                    }
                });

                li.appendChild(a);
                tocList.appendChild(li);
            });
        }

        // Recherche + autocomplétion (sans décalage)
        function setupSearch() {
            const searchInput = document.getElementById('search');
            const autocomplete = document.getElementById('autocomplete');

            searchInput.addEventListener('input', function() {
                const query = this.value.toLowerCase();
                autocomplete.innerHTML = '';

                if (query.length < 2) {
                    autocomplete.style.display = 'none';
                    return;
                }

                const headers = document.querySelectorAll('.content h1, .content h2, .content h3, .content h4');
                let found = false;

                headers.forEach(header => {
                    if (header.textContent.toLowerCase().includes(query)) {
                        found = true;
                        const item = document.createElement('div');
                        item.textContent = header.textContent;
                        item.addEventListener('click', (e) => {
                            e.preventDefault();
                            searchInput.value = '';
                            autocomplete.style.display = 'none';
                            const offset = 80;
                            const targetPosition = header.getBoundingClientRect().top + window.pageYOffset - offset;
                            window.scrollTo({ top: targetPosition, behavior: 'smooth' });
                        });
                        autocomplete.appendChild(item);
                    }
                });

                if (!found) {
                    const item = document.createElement('div');
                    item.textContent = 'Aucun résultat trouvé.';
                    autocomplete.appendChild(item);
                }

                autocomplete.style.display = found ? 'block' : 'none';
            });

            // Fermer l'autocomplétion si clic ailleurs
            document.addEventListener('click', (e) => {
                if (e.target !== searchInput) {
                    autocomplete.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
