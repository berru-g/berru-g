<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation LibreAnalytics</title>
    <script src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"></script>
    <style>
        :root {
            --primary: #9d86ff;
            --secondary: #86b6ff;
            --light: #f8f9fa;
            --dark: #343a40;
        }
        body {
            font-family: 'Inter', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--dark);
            background-color: #fff;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 14px;
        }
        header {
            background-color: white;
            color: var(--primary);
            padding: 14px 0;
            text-align: center;
            margin-bottom: 0px;
        }
        .search-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        #search {
            width: 60%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        #toc {
            background-color: var(--light);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        #toc ul {
            list-style-type: none;
            padding-left: 0;
        }
        #toc li {
            margin-bottom: 5px;
        }
        #toc a {
            color: var(--primary);
            text-decoration: none;
            display: block;
            padding: 5px 10px;
            border-radius: 3px;
        }
        #toc a:hover {
            background-color: var(--primary);
            color: white;
        }
        .content {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        pre {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .autocomplete-items {
            position: absolute;
            border: 1px solid #d4d4d4;
            border-bottom: none;
            border-top: none;
            z-index: 99;
            top: 40%;
            left: 20%;
            right: 20%;
            max-height: 300px;
            overflow-y: auto;
            background: white;
        }
        .autocomplete-items div {
            padding: 10px;
            cursor: pointer;
        }
        .autocomplete-items div:hover {
            background-color: #e9e9e9;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>LibreAnalytics - Documentation</h1>
            <p>Alternative souveraine à Google Analytics</p>
        </div>
        <div class="search-container">
            <input type="text" id="search" placeholder="Rechercher dans la documentation..." autocomplete="on">
        </div>
    </header>

    <div class="container">

        <div id="toc">
            <h2>Sommaire</h2>
            <ul id="toc-list"></ul>
        </div>

        <div class="content" id="doc-content">
            <p>Chargement de la documentation...</p>
        </div>
    </div>

    <script>
        // 1. Récupérer le README.md depuis GitHub
        fetch('https://raw.githubusercontent.com/berru-g/LibreAnalytics/main/readme.md')
            .then(response => response.text())
            .then(markdown => {
                // 2. Convertir le Markdown en HTML
                const converter = new showdown.Converter();
                const html = converter.makeHtml(markdown);
                document.getElementById('doc-content').innerHTML = html;

                // 3. Générer le sommaire
                generateTOC();

                // 4. Activer la recherche
                setupSearch();
            })
            .catch(error => {
                console.error("Erreur lors du chargement du README :", error);
                document.getElementById('doc-content').innerHTML =
                    "<p style='color: red;'>Erreur de chargement. Vérifie que le fichier existe sur GitHub.</p>";
            });

        // Génère le sommaire à partir des titres
        function generateTOC() {
            const headers = document.querySelectorAll('.content h1, .content h2, .content h3');
            const tocList = document.getElementById('toc-list');
            tocList.innerHTML = '';

            headers.forEach((header, index) => {
                const id = `section-${index}`;
                header.id = id;

                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = `#${id}`;
                a.textContent = header.textContent;
                a.style.paddingLeft = `${(parseInt(header.tagName.substring(1)) - 1) * 20}px`;

                li.appendChild(a);
                tocList.appendChild(li);
            });
        }

        // Configure la recherche avec autocomplétion
        function setupSearch() {
            const searchInput = document.getElementById('search');
            searchInput.addEventListener('input', function() {
                const input = this.value.toLowerCase();
                const headers = document.querySelectorAll('.content h1, .content h2, .content h3, .content h4');
                const autocompleteContainer = document.createElement('div');
                autocompleteContainer.className = 'autocomplete-items';
                this.parentNode.appendChild(autocompleteContainer);
                autocompleteContainer.innerHTML = '';

                if (input.length === 0) {
                    autocompleteContainer.style.display = 'none';
                    return;
                }

                let found = false;
                headers.forEach(header => {
                    if (header.textContent.toLowerCase().includes(input)) {
                        found = true;
                        const item = document.createElement('div');
                        item.textContent = header.textContent;
                        item.addEventListener('click', () => {
                            document.getElementById('search').value = '';
                            autocompleteContainer.style.display = 'none';
                            header.scrollIntoView({ behavior: 'smooth' });
                        });
                        autocompleteContainer.appendChild(item);
                    }
                });

                if (!found) {
                    const item = document.createElement('div');
                    item.textContent = 'Aucun résultat trouvé';
                    autocompleteContainer.appendChild(item);
                }

                autocompleteContainer.style.display = found ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
